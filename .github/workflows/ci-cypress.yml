name: CI — Cypress BDD

on:
  push:
    branches: [ main ]
    paths:
      - 'ui_cypress_bdd/**'
      - '.github/workflows/ci-cypress.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'ui_cypress_bdd/**'
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 0'

jobs:
  test:
    name: Cypress BDD — Chrome headless
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui_cypress_bdd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui_cypress_bdd/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress (Chrome headless)
        uses: cypress-io/github-action@v6
        with:
          working-directory: ui_cypress_bdd
          browser: chrome
          spec: cypress/e2e/features/**/*.feature
        env:
          BASE_URL: https://qacart-todo.herokuapp.com
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results -o allure-report --clean

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-cypress-${{ github.run_number }}
          path: ui_cypress_bdd/allure-report
          retention-days: 15

      - name: Upload test artifacts (videos + screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-cypress-${{ github.run_number }}
          path: |
            ui_cypress_bdd/cypress/videos
            ui_cypress_bdd/cypress/screenshots
          retention-days: 7
          if-no-files-found: ignore

      - name: Post result summary
        if: always()
        run: |
          PASSED=$(find allure-results -name "*.json" | xargs grep -l '"status":"passed"' 2>/dev/null | wc -l || echo 0)
          FAILED=$(find allure-results -name "*.json" | xargs grep -l '"status":"failed"' 2>/dev/null | wc -l || echo 0)
          TOTAL=$((PASSED + FAILED))
          echo "## Cypress BDD Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          if [ "$TOTAL" -gt 0 ]; then
            RATE=$(( PASSED * 100 / TOTAL ))
            echo "| Pass Rate | $RATE% |" >> $GITHUB_STEP_SUMMARY
          fi
