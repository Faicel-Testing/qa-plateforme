name: API Tests BDD (Java RestAssured)

# Declencheurs :
#   - push sur main ou feature/** si api-Java-Rest-Assured/ est modifie
#   - PR vers main
#   - declenchement manuel avec choix de la suite
#   - planification : lun-ven 06:30 UTC (08:30 Paris)
on:
  push:
    branches: ["main", "feature/**"]
    paths:
      - "api-Java-Rest-Assured/**"
      - ".github/workflows/ci-api-restassured.yml"

  pull_request:
    branches: ["main"]
    paths:
      - "api-Java-Rest-Assured/**"

  workflow_dispatch:
    inputs:
      suite:
        description: "Suite a executer"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - smoke
          - critical

  schedule:
    - cron: "30 6 * * 1-5"

env:
  FRAMEWORK_DIR: "api-Java-Rest-Assured"
  ALLURE_VERSION: "2.36.0"

jobs:
  test:
    name: API Tests BDD (RestAssured)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: ${{ env.FRAMEWORK_DIR }}/pom.xml

      - name: Set up Python 3.12 (agents)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ env.FRAMEWORK_DIR }}/agents/requirements.txt

      - name: Install agent dependencies
        run: |
          cd ${{ env.FRAMEWORK_DIR }}
          pip install -r agents/requirements.txt

      - name: Pick tag
        id: pick
        shell: bash
        run: |
          SUITE="${{ github.event.inputs.suite || 'all' }}"
          if [ "$SUITE" = "all" ]; then
            echo "TAG=" >> "$GITHUB_OUTPUT"
          else
            echo "TAG=@${SUITE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Cucumber tests (suite = ${{ github.event.inputs.suite || 'all' }})
        working-directory: ${{ env.FRAMEWORK_DIR }}
        run: |
          if [ -n "${{ steps.pick.outputs.TAG }}" ]; then
            mvn -B clean test -Denv=local -Dcucumber.filter.tags="${{ steps.pick.outputs.TAG }}" || true
          else
            mvn -B clean test -Denv=local || true
          fi

      - name: Install Allure CLI
        if: always()
        run: |
          wget -q \
            https://github.com/allure-framework/allure2/releases/download/${{ env.ALLURE_VERSION }}/allure-${{ env.ALLURE_VERSION }}.zip \
            -O /tmp/allure.zip
          unzip -q /tmp/allure.zip -d /opt/
          sudo ln -sf /opt/allure-${{ env.ALLURE_VERSION }}/bin/allure /usr/local/bin/allure
          allure --version

      - name: AI Pipeline (triage + RCA + Jira sync + Go/No-Go)
        if: always()
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_PROJECT: ${{ secrets.JIRA_PROJECT }}
        run: |
          cd ${{ env.FRAMEWORK_DIR }}
          if [ -d target/allure-results ] && [ "$(ls -A target/allure-results 2>/dev/null)" ]; then
            echo "[IA] Triage des echecs (Confidence Scoring)..."
            python agents/bug-agent.py triage        || echo "[IA] bug-agent triage failed, continuing"
            echo "[IA] Root Cause Analysis (Chain of Thought)..."
            python agents/bug-agent.py rca           || echo "[IA] bug-agent rca failed, continuing"
            echo "[IA] Sync resultats -> Jira..."
            python agents/planning-agent.py sync     || echo "[IA] planning-agent sync failed, continuing"
            echo "[IA] Prediction Go/No-Go (Self-Consistency x3)..."
            python agents/advisor-agent.py release   || echo "[IA] advisor-agent failed, continuing"
            echo "[IA] Pipeline IA termine."
          else
            echo "[IA] Aucun resultat Allure -- pipeline IA ignore"
          fi

      - name: Generate Allure report
        if: always()
        run: |
          cd ${{ env.FRAMEWORK_DIR }}
          if [ -d target/allure-results ] && [ "$(ls -A target/allure-results 2>/dev/null)" ]; then
            allure generate target/allure-results -o target/allure-report --clean
            echo "[CI] Rapport Allure genere"
          else
            echo "[CI] Aucun resultat -- rapport ignore"
          fi

      - name: Test summary (annotations GitHub)
        if: always()
        run: |
          cd ${{ env.FRAMEWORK_DIR }}
          python - <<'PY'
          import json, glob

          files = glob.glob("target/allure-results/*-result.json")
          stats = {"passed": 0, "failed": 0, "broken": 0, "skipped": 0}
          fails = []

          for f in files:
              try:
                  with open(f) as fp:
                      d = json.load(fp)
                  s = d.get("status", "unknown")
                  if s in stats:
                      stats[s] += 1
                  if s in ("failed", "broken"):
                      msg = (d.get("statusDetails") or {}).get("message", "")[:120]
                      fails.append(f"{d.get('name','?')} -- {msg}")
              except Exception:
                  pass

          total = sum(stats.values())
          pct   = round(stats["passed"] / total * 100) if total else 0
          bar   = "#" * (pct // 5) + "." * (20 - pct // 5)

          print(f"::notice title=API RestAssured Results::[{bar}] {pct}% | "
                f"Total:{total} PASS:{stats['passed']} FAIL:{stats['failed']} BROKEN:{stats['broken']}")

          for f in fails[:5]:
              print(f"::warning title=Test FAIL::{f}")

          if stats["failed"] > 0 or stats["broken"] > 0:
              print(f"::error title=Tests en echec::{stats['failed']+stats['broken']} test(s) ont echoue")
          PY

      - name: Upload allure-results (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: api-Java-Rest-Assured/target/allure-results/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload allure-report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: api-Java-Rest-Assured/target/allure-report/
          retention-days: 30
          if-no-files-found: warn

  deploy-pages:
    name: Deploy Allure Report -> GitHub Pages
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download allure-report artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report/
        continue-on-error: true

      - name: Publish to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: api-Java-Rest-Assured
          keep_files: true
          commit_message: "ci: update Allure report (api-Java-Rest-Assured) [skip ci]"
