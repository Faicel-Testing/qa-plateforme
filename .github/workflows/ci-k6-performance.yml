name: CI — k6 Performance (QACart)

# Declencheurs :
#   - push sur main si perf_k6_qacart/ est modifie
#   - PR vers main
#   - declenchement manuel
#   - planification hebdomadaire (dimanche 07h00 UTC) — charge legere, app demo publique partagee
on:
  push:
    branches: ["main"]
    paths:
      - "perf_k6_qacart/**"
      - ".github/workflows/ci-k6-performance.yml"

  pull_request:
    branches: ["main"]
    paths:
      - "perf_k6_qacart/**"

  workflow_dispatch:

  schedule:
    - cron: "0 7 * * 0"

env:
  FRAMEWORK_DIR: "perf_k6_qacart"

jobs:
  test:
    name: k6 Performance — smoke + load + stress
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20 (agents)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ env.FRAMEWORK_DIR }}/package-lock.json

      - name: Install agent dependencies
        working-directory: ${{ env.FRAMEWORK_DIR }}
        run: npm ci

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 scenarios (smoke -> load -> stress)
        working-directory: ${{ env.FRAMEWORK_DIR }}
        env:
          BASE_URL: https://qacart-todo.herokuapp.com
          K6_WEB_DASHBOARD: "true"
          K6_WEB_DASHBOARD_PERIOD: "5s"
        run: |
          mkdir -p reports
          for s in smoke load stress; do
            echo "[k6] Scenario: $s"
            K6_WEB_DASHBOARD_EXPORT="reports/dashboard-$s.html" \
              k6 run --summary-export="reports/summary-$s.json" "k6/scenarios/$s.js" || true
          done

      - name: AI Pipeline (triage + RCA + Go/No-Go)
        if: always()
        working-directory: ${{ env.FRAMEWORK_DIR }}
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -d reports ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "[IA] Triage des seuils depasses (Confidence Scoring)..."
            node scripts/agents/quality-agent.js triage    || echo "[IA] quality-agent triage failed, continuing"
            echo "[IA] Root Cause Analysis (Chain of Thought)..."
            node scripts/agents/quality-agent.js rca       || echo "[IA] quality-agent rca failed, continuing"
            echo "[IA] Prediction Go/No-Go (Self-Consistency x3)..."
            node scripts/agents/advisor-agent.js advise    || echo "[IA] advisor-agent failed, continuing"
            echo "[IA] Dashboard KPI..."
            node scripts/agents/reporting-agent.js dashboard || echo "[IA] reporting-agent failed, continuing"
            echo "[IA] Pipeline IA termine."
          else
            echo "[IA] Aucun resultat k6 -- pipeline IA ignore"
          fi

      - name: Test summary (annotations GitHub)
        if: always()
        working-directory: ${{ env.FRAMEWORK_DIR }}
        run: |
          node - <<'JS'
          const fs = require('fs');
          const scenarios = ['smoke', 'load', 'stress'];
          let totalBreaches = 0, blockingBreaches = 0;
          for (const s of scenarios) {
            const fp = `reports/summary-${s}.json`;
            if (!fs.existsSync(fp)) continue;
            const summary = JSON.parse(fs.readFileSync(fp, 'utf8'));
            const dur = summary.metrics?.http_req_duration || {};
            const httpFailed = summary.metrics?.http_req_failed || { value: 0 };
            const breaches = [];
            for (const [name, metric] of Object.entries(summary.metrics || {})) {
              for (const [expr, breached] of Object.entries(metric.thresholds || {})) {
                if (breached) breaches.push(`${name} ${expr}`);
              }
            }
            totalBreaches += breaches.length;
            if (['smoke', 'load'].includes(s)) blockingBreaches += breaches.length;
            const p95 = Math.round(dur['p(95)'] || 0);
            const err = Math.round((httpFailed.value || 0) * 1000) / 10;
            console.log(`::notice title=k6 ${s}::p95=${p95}ms error_rate=${err}% breaches=${breaches.length}`);
            breaches.forEach(b => console.log(`::warning title=Seuil depasse (${s})::${b}`));
          }
          if (blockingBreaches > 0) {
            console.log(`::error title=Quality Gate::${blockingBreaches} seuil(s) bloquant(s) depasse(s) en smoke/load`);
          }
          JS

      - name: Upload k6 reports (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-reports
          path: |
            perf_k6_qacart/reports/
            perf_k6_qacart/docs/kpi-dashboard.html
          retention-days: 30
          if-no-files-found: warn

  deploy-pages:
    name: Deploy k6 dashboards -> GitHub Pages
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download k6 reports artifact
        uses: actions/download-artifact@v4
        with:
          name: k6-reports
          path: k6-pages/
        continue-on-error: true

      - name: Build index page
        run: |
          mkdir -p k6-pages/reports
          cat > k6-pages/index.html <<'HTML'
          <!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>k6 Performance — QACart</title>
          <style>body{font-family:sans-serif;background:#0f172a;color:#e2e8f0;padding:32px}
          a{color:#7c3aed;display:block;margin:8px 0;font-size:1.1rem}h1{color:#7c3aed}</style></head>
          <body><h1>k6 Performance — QACart Todo</h1>
          <a href="docs/kpi-dashboard.html">KPI Dashboard (Chart.js)</a>
          <a href="reports/dashboard-smoke.html">Dashboard natif k6 — smoke</a>
          <a href="reports/dashboard-load.html">Dashboard natif k6 — load</a>
          <a href="reports/dashboard-stress.html">Dashboard natif k6 — stress</a>
          </body></html>
          HTML

      - name: Publish to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./k6-pages
          destination_dir: perf_k6_qacart
          keep_files: true
          commit_message: "ci: update k6 performance dashboards (perf_k6_qacart) [skip ci]"
