name: SonarCloud - UI PR

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "ui/selenium-cucumber-testng/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  sonar-ui:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build
        working-directory: ui/selenium-cucumber-testng
        run: mvn -B clean verify

      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectBaseDir=ui/selenium-cucumber-testng
            -Dsonar.qualitygate.wait=true