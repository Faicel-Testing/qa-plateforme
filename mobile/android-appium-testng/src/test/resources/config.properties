#
# Règles validation :
#   email    → doit être un email valide (x@y.z) ; non vide
#   password → min 8 caractères UNIQUEMENT (pas d'obligation upper/lower/chiffre)
#   firstName → min 2 caractères
#   lastName  → min 2 caractères
# ============================================================

# ── Compte principal (pré-enregistré en base le 2026-06-11) ──
login.email=faicel.ghanem@gmail.com
login.password=tEST@9643

# ── Compte signup (à utiliser UNE SEULE FOIS — après succès, le email existe déjà)
# Si Test02_Signup échoue "Email is already exists", changer signup.email
# pour un email non utilisé puis relancer.
signup.fullname=Faysal Ghanem
signup.firstname=Faysal
signup.lastname=Ghanem
