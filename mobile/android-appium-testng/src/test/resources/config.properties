# ── Todos ────────────────────────────────────────────────────
# API: POST /api/v1/tasks  { "item": "...", "isCompleted": false }
# La liste est liée au compte (userID) — elle persiste entre sessions.
todo.text=Buy groceries
todo.text2=Read a book

# ── Données négatives — Login ────────────────────────────────
# Scénario 1 : email inexistant → "We could not find the email in the database"
login.wrong.email=notregistered@email.com
login.wrong.password=WrongPassword123

# Scénario 2 : email valide mais mauvais mot de passe
# → "The email and password combination is not correct..."
login.existing.wrong.password.email=faicel.ghanem@gmail.com
login.existing.wrong.password.pass=WrongPassword999

# Scénario 3 : format email invalide → "Please Fill a correct Password"
login.invalid.email=notanemail
login.empty.email=
login.empty.password=

# ── Données négatives — Signup ───────────────────────────────
# email déjà existant → "Email is already exists in the Database"
signup.existing.email=faicel.ghanem@gmail.com
signup.existing.fullname=Faicel Ghanem
signup.existing.firstname=Faicel
signup.existing.lastname=Ghanem
signup.existing.password=tEST@9643

# ── Edge cases — Signup ──────────────────────────────────────
# Mot de passe trop court → "password" length must be at least 8 characters long"
signup.weak.password=123
signup.short.fullname=A

# ── Edge cases — Todo ────────────────────────────────────────
# Texte long (180 chars) — accepté par l'API (aucune limite constatée)
todo.text.long=This is an extremely long todo item to test boundary conditions in the mobile UI and verify how the app handles strings that might overflow or get truncated in the list view

# Caractères spéciaux — acceptés par l'API
todo.text.special=!@#$%^&*()++={}
