env=qa

# ── App ──────────────────────────────────────────────────────
app.path=src/test/resources/apps/my-demo-app.apk
appium.url=http://127.0.0.1:4723
platformName=Android
automationName=UiAutomator2

deviceName=Android Emulator
udid=emulator-5554

noReset=false
newCommandTimeout=120

# ── SauceLabs My Demo App v2.2.0 credentials ─────────────────
# Package : com.saucelabs.mydemoapp.android
# Standard user
login.email=bod@example.com
login.password=10203040

# Locked-out user (should see error)
login.locked.email=fiona@example.com
login.locked.password=10203040

# Wrong credentials (for negative tests)
login.wrong.email=unknown@example.com
login.wrong.password=wrongpass99

retry.max=2
retry.max.regression=1
retry.max.quarantine=3

# ── Checkout data ─────────────────────────────────────────────
checkout.fullname=Bob Smith
checkout.address=123 Main Street
checkout.city=San Francisco
checkout.state=California
checkout.zip=94102
checkout.country=United States

checkout.card=1234567890123456
