<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<title>Reporting Dashboard — ui_selenium_bdd</title>
<style>
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',sans-serif;margin:0;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin:20px 0}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:18px;text-align:center}
.metric{font-size:2.2em;font-weight:bold;margin:8px 0}
.label{color:#8b949e;font-size:.8em;text-transform:uppercase;letter-spacing:1px}
.gate{padding:16px;text-align:center;font-size:1.4em;font-weight:bold;
       background:#2ecc7122;border:2px solid #2ecc71;border-radius:12px;color:#2ecc71}
h1{color:#58a6ff;border-bottom:1px solid #30363d;padding-bottom:10px}
</style></head><body>
<h1>📊 Reporting Dashboard — Selenium BDD</h1>
<p style="color:#8b949e">automationexercise.com · 2026-06-20 18:12</p>
<div class="gate">✅ QUALITY GATE : PASS</div>
<div class="grid">
  <div class="card"><div class="metric" style="color:#58a6ff">12</div><div class="label">Tests</div></div>
  <div class="card"><div class="metric" style="color:#2ecc71">12</div><div class="label">Passés</div></div>
  <div class="card"><div class="metric" style="color:#e74c3c">0</div><div class="label">Échoués</div></div>
  <div class="card"><div class="metric" style="color:#f39c12">0</div><div class="label">Brisés</div></div>
  <div class="card"><div class="metric" style="color:#2ecc71">100.0%</div><div class="label">Pass Rate</div></div>
  <div class="card"><div class="metric" style="color:#2ecc71">0.0%</div><div class="label">Fail Rate</div></div>
</div></body></html>
