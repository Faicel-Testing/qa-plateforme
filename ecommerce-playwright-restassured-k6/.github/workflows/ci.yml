name: E-commerce QA — Playwright + REST Assured + K6

on:
  push:
    branches: [main, feature/**]
    paths:
      - 'ecommerce-playwright-restassured-k6/**'
  pull_request:
    branches: [main]
    paths:
      - 'ecommerce-playwright-restassured-k6/**'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite à exécuter (all / ui / api / perf)'
        required: false
        default: 'all'
  schedule:
    - cron: '0 6 * * 1-5'

env:
  BASE_URL:  https://automationexercise.com
  FRAMEWORK: ecommerce-playwright-restassured-k6

jobs:
  # ── Job 1 : Tests UI Playwright BDD ──────────────────────────────────────
  ui-tests:
    name: UI — Playwright BDD TypeScript
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'ui' || github.event.inputs.suite == '' }}
    defaults:
      run:
        working-directory: ${{ env.FRAMEWORK }}/ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.FRAMEWORK }}/ui/package.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        run: npm test
        env:
          BASE_URL:   ${{ env.BASE_URL }}
          HEADLESS:   true
          BROWSER:    chromium

      - name: Upload UI Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: ${{ env.FRAMEWORK }}/ui/allure-results/
          retention-days: 7

  # ── Job 2 : Tests API REST Assured ───────────────────────────────────────
  api-tests:
    name: API — REST Assured Java
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'api' || github.event.inputs.suite == '' }}
    defaults:
      run:
        working-directory: ${{ env.FRAMEWORK }}/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run API tests
        run: mvn test -Dbase.url=${{ env.BASE_URL }}

      - name: Upload API Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: ${{ env.FRAMEWORK }}/api/target/allure-results/
          retention-days: 7

  # ── Job 3 : Tests Performance K6 ─────────────────────────────────────────
  perf-tests:
    name: Performance — K6 Smoke
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'perf' || github.event.inputs.suite == '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6 -y

      - name: Run K6 Smoke test
        run: k6 run ${{ env.FRAMEWORK }}/perf/scripts/smoke.js \
          --out json=${{ env.FRAMEWORK }}/perf/results/smoke-results.json
        continue-on-error: true

      - name: Upload K6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: ${{ env.FRAMEWORK }}/perf/results/
          retention-days: 7

  # ── Job 4 : Rapport Allure unifié UI + API ────────────────────────────────
  allure-report:
    name: Allure Report — UI + API
    runs-on: ubuntu-latest
    needs: [ui-tests, api-tests]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download UI results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results/

      - name: Download API results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/

      - name: Install Allure
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure-2.29.0.tgz
          sudo ln -sf $PWD/allure-2.29.0/bin/allure /usr/local/bin/allure

      - name: Generate unified Allure report
        run: allure generate allure-results -o allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: ecommerce-playwright-restassured-k6
          keep_files: true

      - name: Upload unified report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-unified
          path: allure-report/
          retention-days: 30
