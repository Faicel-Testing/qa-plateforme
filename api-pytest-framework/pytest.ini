[pytest]
testpaths = tests
addopts = -v --tb=short --alluredir=allure-results
bdd_features_base_dir = features/
markers =
    smoke: quick sanity checks on main endpoints
    regression: full API test suite
    auth: authentication and token tests
    booking: booking CRUD tests
    health: API health check tests
    positif: scenario passant (happy path)
    negatif: scenario non passant (erreur attendue)
    securite: scenario de securite (injection, XSS)
    limite: scenario de valeur limite metier
    performance: scenario de performance
    us-001: US-001 POST /auth
    us-002: US-002 GET /booking
    us-003: US-003 GET /booking/{id}
    us-004: US-004 POST /booking
    us-005: US-005 PUT /booking/{id}
    us-006: US-006 PATCH /booking/{id}
    us-007: US-007 DELETE /booking/{id}
    us-008: US-008 GET /ping
